appId: com.plucker.app
productName: Plucker
# store skips the extra archive compression pass: faster release builds for a
# marginally larger artifact — the DMG is already zlib-compressed (UDZO) below.
compression: normal
# Rewrites the macOS Helper bundles' CFBundleName (which electron-builder leaves as
# the upstream "Electron Helper (...)") to match productName. See the script header.
afterPack: scripts/after-pack.mjs
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  # Native addon: ship only the JS loader + the staged prebuilds/Module.node — never
  # SwiftPM's .build tree (hundreds of MB), the Swift sources, or the build toolchain.
  - "!node_modules/@plucker/native-context-menu/.build/**"
  - "!node_modules/@plucker/native-context-menu/Sources/**"
  - "!node_modules/@plucker/native-context-menu/scripts/**"
  - "!node_modules/@plucker/native-context-menu/node_modules/**"
  - "!node_modules/@plucker/native-context-menu/{Package.swift,Package.resolved,.swiftpm}"
fileAssociations:
  - ext: mp3
    name: MP3 Audio
    mimeType: audio/mpeg
    role: Editor
  - ext: m4a
    name: M4A Audio
    mimeType: audio/x-m4a
    role: Editor
  - ext: flac
    name: FLAC Audio
    mimeType: audio/flac
    role: Editor
  - ext: mp4
    name: MP4 Video
    mimeType: video/mp4
    role: Editor
  - ext: m4v
    name: M4V Video
    mimeType: video/x-m4v
    role: Editor
asar: true
asarUnpack:
  - resources/**
  # The native .node must live on disk (can't be loaded from inside the asar).
  - node_modules/@plucker/native-context-menu/prebuilds/**
win:
  executableName: plucker
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    # macOS 26 renders the Liquid Glass icon from Contents/Resources/Assets.car
    # (compiled by scripts/build-icon.mjs and copied in via extraResources below).
    # Older macOS ignores this key and falls back to the pre-shaped .icns. The key
    # is harmless when Assets.car is absent (e.g. built without Xcode 26) — macOS
    # then just falls back to the .icns too.
    - CFBundleIconName: Icon
  notarize: false
  identity: null
  hardenedRuntime: true
  minimumSystemVersion: 13.0
  darkModeSupport: true
  # Embed the macOS 26 Liquid Glass asset catalog when build-icon.mjs produced one.
  # The glob makes its absence a no-op, so pre-Xcode-26 builds still succeed (with
  # only the legacy .icns). Merged with the top-level extraResources.
  extraResources:
    - from: build
      to: .
      filter: ["Assets.car"]
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    # zip is required for electron-updater on macOS: it is what generates
    # latest-mac.yml. Disabling it breaks auto-update detection for dmg builds.
    - target: zip
      arch:
        - arm64
        - x64
extraResources:
  # Per-arch bin/: the yt-dlp onedir folder (yt-dlp/yt-dlp_macos + _internal/) and ffmpeg.
  - from: resources/bin/${arch}
    to: bin/${arch}
    filter: ["**/*"]
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  # zlib-compressed disk image (electron-builder's default): much faster to
  # build/mount than bzip2 (UDBZ) for only a slightly larger image — the extra
  # compression wasn't worth the long CI release times.
  format: UDZO
  shrink: true
  writeUpdateInfo: false
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: $me}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: filiphsps
  repo: plucker
releaseInfo:
  releaseNotesFile: CHANGELOG.md
