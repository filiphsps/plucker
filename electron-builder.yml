appId: com.plucker.app
productName: Plucker
compression: normal
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: plucker
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    # zip is required for electron-updater on macOS: it is what generates
    # latest-mac.yml. Disabling it breaks auto-update detection for dmg builds.
    - target: zip
      arch:
        - arm64
        - x64
extraResources:
  # Per-arch bin/: the yt-dlp onedir folder (yt-dlp/yt-dlp_macos + _internal/) and ffmpeg.
  - from: resources/bin/${arch}
    to: bin/${arch}
    filter: ['**/*']
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  # zlib-compressed disk image (electron-builder's default): much faster to
  # build/mount than bzip2 (UDBZ) for only a slightly larger image — the extra
  # compression wasn't worth the long CI release times.
  format: UDZO
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: filiphsps
  repo: plucker
