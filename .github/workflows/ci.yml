name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      # The app icon is generated (not committed) by `pnpm build` via Playwright,
      # so the browser + its Linux system libraries must be present first.
      - run: pnpm exec playwright install --with-deps chromium

      # `pnpm build` renders the icon, runs typecheck (node + web), then electron-vite build.
      - run: pnpm build
