name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fetches yt-dlp + both ffmpeg arches and packages the unsigned arm64 + x64 DMGs
      # (plus zip + latest-mac.yml for electron-updater). --publish never: the release
      # already exists (release-please made it); we upload the assets ourselves below.
      - run: pnpm build:mac

      # Upload the DMGs plus the electron-updater metadata (zip + latest-mac.yml).
      # nullglob keeps this resilient: if the update metadata isn't present, only the
      # DMGs upload rather than failing the release.
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*.dmg dist/*.zip dist/latest-mac.yml)
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${assets[@]}" --clobber
