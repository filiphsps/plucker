name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # One job per arch so the slow DMG compression runs in parallel. Each arch builds
  # the app once and produces BOTH its distributable zip (the electron-updater
  # artifact, with its differential .blockmap) and its DMG (standalone installer),
  # plus that arch's slice of latest-mac.yml. The per-arch yml is stashed on the
  # release under a distinct name so finalize-metadata can merge the two slices
  # without the parallel arch jobs racing on a shared asset.
  build-macos:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # macOS 26 (Xcode 26 / actool 26) so `pnpm build` → build:icon can compile the
    # Icon Composer .icon into Assets.car for the macOS 26 Liquid Glass app icon.
    # Older images skip that step and ship only the legacy .icns.
    # TODO: switch back to `macos-latest` once macOS 26 is GA there (currently it
    # still points at macOS 15, which lacks actool 26).
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # Electron + electron-builder download their binaries/tools to ~/Library/Caches;
      # cache them (keyed on the lockfile) so reinstalls and packaging skip the fetch.
      - name: Cache Electron & builder
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - run: pnpm install --frozen-lockfile

      # Cache the Playwright browser download (keyed on the lockfile's playwright
      # version) so it isn't re-fetched every run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      # build:icon (part of `pnpm run build`) renders the icon via Playwright Chromium.
      - run: pnpm exec playwright install chromium

      # Cache the native addon's SwiftPM build tree. node-swift's swift-syntax
      # dependency is by far the slowest thing to compile and only changes when
      # node-swift does, so restoring `.build` lets the incremental build (build:native
      # runs `node-swift build`, not `rebuild`) skip recompiling it. Keyed on the
      # node-swift version (package.json) + Package.swift; a Swift-toolchain change is
      # self-healing — node-swift records the toolchain in `.build` and recompiles on
      # mismatch, so a stale restore can't ship a bad binary.
      - name: Cache native addon SwiftPM build
        uses: actions/cache@v4
        with:
          path: native/context-menu/.build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('native/context-menu/package.json', 'native/context-menu/Package.swift') }}
          restore-keys: ${{ runner.os }}-swiftpm-

      # --all: an arm64 runner's postinstall only fetches arm64 binaries, so the x64
      # slice needs the cross-arch yt-dlp + ffmpeg to package.
      - run: node scripts/fetch-binaries.mjs --all

      - run: pnpm run build

      # One build → this arch's zip (+ blockmap) and DMG, plus its latest-mac.yml.
      - run: pnpm exec electron-builder --mac zip dmg --${{ matrix.arch }} --config electron-builder.yml --publish never

      # The zip + its differential blockmap are the electron-updater artifacts; the
      # DMG is the standalone installer. Blockmaps are required by Plucker's
      # differential updater (src/main/differential.ts): it diffs the new zip's
      # blockmap against the cached previous one to fetch only changed byte ranges.
      # nullglob keeps this resilient if a glob matches nothing.
      - name: Upload zip + DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*.zip dist/*.zip.blockmap dist/*.dmg)
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${assets[@]}" --clobber

      # Stash this arch's latest-mac.yml under a distinct name. Distinct names mean
      # the two parallel arch jobs never race; finalize-metadata merges them into the
      # single latest-mac.yml electron-updater reads.
      - name: Upload per-arch update metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp dist/latest-mac.yml "latest-mac-${{ matrix.arch }}.yml"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "latest-mac-${{ matrix.arch }}.yml" --clobber

  # Runs after both arch builds. Merges the per-arch latest-mac.yml slices into the
  # single combined metadata electron-updater consumes, then renders the UI
  # screenshots and attaches them to the release body. Builds the app for the
  # screenshot pass.
  finalize-metadata:
    needs: [release-please, build-macos]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # Matches build-macos: macOS 26 so this job's `pnpm build` resolves the same
    # toolchain. Switch back to `macos-latest` once macOS 26 is GA (see build-macos).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # Electron downloads its binary to ~/Library/Caches/electron during install;
      # cache it (keyed on the lockfile) so the screenshot build's install is faster.
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - run: pnpm install --frozen-lockfile

      # Merge the two per-arch latest-mac.yml slices into one. Start from arm64 as the
      # primary (version/path/releaseDate) and append x64's files entry, so the
      # combined `files` array lists both arch zips with their real hashes. Then drop
      # the per-arch temporaries. yq is preinstalled on GitHub-hosted runners.
      - name: Merge update metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release download "$TAG" -p 'latest-mac-*.yml'
          yq -i '.files += load("latest-mac-x64.yml").files' latest-mac-arm64.yml
          cp latest-mac-arm64.yml latest-mac.yml
          gh release upload "$TAG" latest-mac.yml --clobber
          gh release delete-asset "$TAG" latest-mac-arm64.yml -y
          gh release delete-asset "$TAG" latest-mac-x64.yml -y

      # Cache the Playwright browser download (keyed on the lockfile's playwright
      # version) so it isn't re-fetched every run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      # The screenshot pass drives Playwright Chromium (also used by build:icon).
      - run: pnpm exec playwright install chromium

      # Reuse the SwiftPM build tree the build-macos jobs already populated this run
      # (same key), so this screenshot build's build:native skips the swift-syntax
      # recompile too. See build-macos for the keying rationale.
      - name: Cache native addon SwiftPM build
        uses: actions/cache@v4
        with:
          path: native/context-menu/.build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('native/context-menu/package.json', 'native/context-menu/Package.swift') }}
          restore-keys: ${{ runner.os }}-swiftpm-

      - run: pnpm run build

      # Render UI screenshots from the freshly built app (out/ exists after build)
      # into .github/img/. Cosmetic, so continue-on-error keeps the release green.
      - run: pnpm build:screenshots
        continue-on-error: true

      # Attach the screenshots to the release: upload them as assets and reference
      # them from the release body so they're visible on the release page (instead
      # of committing them back to master). The sed range strips any prior
      # "## Screenshots" section first, so re-runs stay idempotent. Cosmetic, so
      # continue-on-error keeps the release green.
      - name: Attach screenshots to release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          shots=(.github/img/*.png)
          if [ ${#shots[@]} -eq 0 ]; then
            echo "screenshots: none rendered, nothing to attach"
            exit 0
          fi
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$TAG" "${shots[@]}" --clobber
          gh release view "$TAG" --json body -q .body | sed '/^## Screenshots$/,$d' > body.md
          printf '\n## Screenshots\n\n' >> body.md
          for f in "${shots[@]}"; do
            name=$(basename "$f")
            printf '![%s](https://github.com/%s/releases/download/%s/%s)\n\n' \
              "$name" "$GITHUB_REPOSITORY" "$TAG" "$name" >> body.md
          done
          gh release edit "$TAG" --notes-file body.md
