name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Update metadata first, in one job: build both arch zips together so the single
  # latest-mac.yml electron-updater reads lists both slices with matching hashes.
  # latest-mac.yml references the *zips* (the macOS update artifacts) — never the
  # DMGs — so the heavy DMG compression can run independently in the matrix below.
  # Screenshots are rendered + committed here too, since this job already builds the app.
  build-update-metadata:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The app icon is generated (not committed) during the build via Playwright,
      # and the screenshot pass drives the same Chromium binary.
      - run: pnpm exec playwright install chromium

      # Both arches' yt-dlp + ffmpeg, needed to package the universal zips.
      - run: node scripts/fetch-binaries.mjs --all

      - run: pnpm run build

      # zip-only target → produces both arch zips + the combined latest-mac.yml.
      # --publish never: the release already exists (release-please made it); we
      # upload the assets ourselves below.
      - run: pnpm exec electron-builder --mac zip --arm64 --x64 --config electron-builder.yml --publish never

      # Upload the electron-updater metadata (latest-mac.yml), the zips it
      # references, and their .blockmap sidecars. The blockmaps are required by
      # Plucker's differential updater (src/main/differential.ts): it downloads
      # the new zip's blockmap to diff against the cached previous zip and fetch
      # only the changed byte ranges. nullglob keeps this resilient if a glob
      # matches nothing. (`dist/*.zip` does not match `*.zip.blockmap`.)
      - name: Upload update metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*.zip dist/*.zip.blockmap dist/latest-mac.yml)
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${assets[@]}" --clobber

      # Render UI screenshots from the freshly built app (out/ exists after build)
      # into .github/img/. These are committed back to master so the README images
      # track every release.
      - run: pnpm build:screenshots

      # Commit the refreshed screenshots back to master. The release commit (= this tag)
      # is master's tip at release time, so the screenshot commit fast-forwards onto it.
      # [skip ci] avoids a redundant CI run; the chore: prefix opens no new release PR.
      - name: Commit refreshed screenshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- .github/img; then
            echo "screenshots: no changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/img/*.png
          git commit -m "chore(screenshots): refresh for ${{ needs.release-please.outputs.tag_name }} [skip ci]"
          git push origin HEAD:master

  # One job per arch so the slow DMG compression runs in parallel. Depends on
  # build-update-metadata so the update metadata is in place first. DMGs are
  # standalone install artifacts (not part of latest-mac.yml), so they upload
  # without touching the metadata published above.
  build-macos:
    needs: [release-please, build-update-metadata]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # build:icon (part of `pnpm run build`) renders the icon via Playwright Chromium.
      - run: pnpm exec playwright install chromium

      - run: node scripts/fetch-binaries.mjs --all

      - run: pnpm run build

      # DMG-only build for this arch — the expensive UDZO compression, parallelized.
      - run: pnpm exec electron-builder --mac dmg --${{ matrix.arch }} --config electron-builder.yml --publish never

      - name: Upload DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*.dmg)
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${assets[@]}" --clobber
