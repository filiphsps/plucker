name: screenshots

# On-demand refresh: build the app on macOS, render the UI screenshots, and
# commit the regenerated images back to .github/img/ on the current branch.
# The [skip ci] tag on the commit keeps this from re-triggering CI.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Playwright drives both the icon render (during build) and the app screenshots.
      - run: pnpm exec playwright install chromium

      # Builds the renderer + main process into out/, which build:screenshots launches.
      - run: pnpm build

      - run: pnpm build:screenshots

      # Commit the regenerated screenshots back to .github/img/ on the current
      # branch. [skip ci] prevents this commit from re-triggering CI.
      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/img/*.png
          if git diff --staged --quiet; then
            echo "screenshots: no changes to commit"
            exit 0
          fi
          git commit -m "chore(screenshots): refresh UI screenshots [skip ci]"
          git push
