# Pin dependencies: `pnpm add` writes an exact version (no `^`/`~`) so every
# dependency in package.json stays pinned. Renovate then owns version bumps.
saveExact: true

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  ffmpeg-static: true

minimumReleaseAgeExclude:
  - vite@8.0.16
