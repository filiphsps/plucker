# Pin dependencies: `pnpm add` writes an exact version (no `^`/`~`) so every
# dependency in package.json stays pinned. Renovate then owns version bumps.
saveExact: true

# Native binding packages (Swift / N-API). Built on demand, not on root install.
packages:
  - native/*

allowBuilds:
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  ffmpeg-static: true

minimumReleaseAgeExclude:
  - vite@8.0.16
